<!DOCTYPE html>
<html>
<head>
    <title>Teacher Subjects</title>
</head>
<body>

<h2>Assigned Subjects</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Subject</th>
        <th>Chapter</th>
        <th>Action</th>
    </tr>

    {% for subject in subjects %}
    <tr>
        <td>{{ subject.id }}</td>
        <td>{{ subject.subject_name }}</td>
        <td>{{ subject.chapter_name }}</td>
        <td>
            <a href="/create_quiz/{{ subject.id }}">
                <button>Create Quiz</button>
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
