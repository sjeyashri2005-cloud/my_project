<!DOCTYPE html>
<html>

<head>

    <title>Signup - Quiz Master</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-box">

        <h1>Quiz Master Signup</h1>

        <p>Create your account</p>

        <form method="POST">

            <input type="text"
                   name="fullname"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>

            <select name="role"
                    required>

                <option value="">Select Role</option>

                <option value="student">Student</option>

                <option value="teacher">Teacher</option>

            </select>

            <button type="submit">

                SIGN UP

            </button>

        </form>

        <p>

            Already have account?

            <a href="/">

                Login

            </a>

        </p>

    </div>

</div>

</body>

</html>
