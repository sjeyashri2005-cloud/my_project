<!DOCTYPE html>
<html>
<head>
    <title>Quiz Reports</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 90%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ⭐ BACK BUTTON ADDED HERE -->
    <a href="/admin_dashboard">
        <button type="button" style="
            background:#333;
            color:white;
            padding:8px 15px;
            border:none;
            border-radius:5px;
            margin-bottom:10px;
            cursor:pointer;
        ">
            ⬅ Back to Dashboard
        </button>
    </a>

    <h2>📊 Quiz Score Reports</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Email</th>
            <th>Quiz Name</th>
            <th>Score</th>
            <th>Total</th>
        </tr>

        {% for result, user, quiz in results %}
        <tr>
            <td>{{ result.id }}</td>
            <td>{{ user.fullname }}</td>
            <td>{{ user.email }}</td>
            <td>{{ quiz.title }}</td>
            <td>{{ result.score }}</td>
            <td>{{ result.total }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
