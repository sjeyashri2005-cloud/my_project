<h2>Edit Assigned Subject</h2>

<form method="POST">

    <select name="teacher_id">

        {% for t in teachers %}
        <option value="{{ t.id }}"
            {% if t.id == subject.teacher_id %}selected{% endif %}>
            {{ t.fullname }}
        </option>
        {% endfor %}

    </select>

    <button type="submit">Update</button>

</form>
