<!DOCTYPE html>
<html>

<head>

    <title>My Quizzes</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:20px;
        }

        h2{
            color:#2c3e50;
            margin-bottom:20px;
        }

        /* BUTTON STYLE */
        button{
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            opacity:0.9;
        }

        /* FORM DESIGN */
        form{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            width:400px;
            margin-bottom:20px;
        }

        form input{
            width:70%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        form input:focus{
            border-color:#3498db;
        }

        form button{
            background:#3498db;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:5px;
            margin-left:5px;
        }

        form button:hover{
            background:#2980b9;
        }

        /* TABLE DESIGN */
        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        table th{
            background:#2c3e50;
            color:white;
            padding:12px;
            text-align:center;
        }

        table td{
            padding:12px;
            text-align:center;
            border:1px solid #ddd;
        }

        table tr:hover{
            background:#f1f1f1;
        }

        /* LINKS */
        a{
            text-decoration:none;
            font-weight:bold;
        }

        a[href*="add_question"]{
            color:green;
        }

        a[href*="delete_quiz"]{
            color:red;
        }

        a[href*="add_question"]:hover,
        a[href*="delete_quiz"]:hover{
            text-decoration:underline;
        }

        hr{
            border:none;
            height:1px;
            background:#ccc;
            margin:20px 0;
        }

        /* RESPONSIVE */
        @media screen and (max-width:768px){

            form{
                width:100%;
            }

            form input{
                width:100%;
                margin-bottom:10px;
            }

            form button{
                width:100%;
                margin-left:0;
            }

            table{
                font-size:13px;
            }

        }

    </style>

</head>

<body>

<h2>My Quizzes - {{ subject.subject_name }}</h2>

<!-- BACK BUTTON -->
<a href="/teacher_dashboard">

    <button style="
        background:#333;
        color:white;
        padding:8px 15px;
        border:none;
        border-radius:5px;
        margin-bottom:15px;
        cursor:pointer;
    ">

        ⬅ Back to Dashboard

    </button>

</a>

<form method="POST" action="/create_quiz/{{ subject.id }}">

    <input type="text"
           name="title"
           placeholder="Enter quiz title"
           required>

    <button type="submit">
        Add Quiz
    </button>

</form>

<hr>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Subject</th>
        <th>Action</th>
    </tr>

    {% for q in quizzes %}

    <tr>

        <td>{{ q.id }}</td>

        <td>{{ q.title }}</td>

        <td>{{ subject.subject_name }}</td>

        <td>

            <a href="/add_question/{{ q.id }}">
                Add Question
            </a>

            |

            <a href="/delete_quiz/{{ q.id }}"
               onclick="return confirm('Are you sure to delete this quiz?')">

               Delete

            </a>

        </td>

    </tr>

    {% endfor %}

</table>

</body>

</html>
