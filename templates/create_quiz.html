<!DOCTYPE html>
<html>

<head>
    <title>Create Quiz</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 50%;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-box {
            display: flex;
            flex-direction: column;
        }

        .radio-group {
            margin-top: 10px;
        }

        .radio-group label {
            display: block;
            margin: 5px 0;
            font-weight: normal;
        }

        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Create Quiz for Python</h2>

    <form method="POST">

        <!-- QUIZ TITLE -->
        <label>Quiz Title</label>
        <input type="text" name="quiz_title" placeholder="Enter Quiz Title" required>

        <!-- QUESTION -->
        <label>Question</label>
        <input type="text" name="question" placeholder="Enter Question" required>

        <!-- OPTIONS -->
        <label>Options</label>

        <div class="options">

            <div class="option-box">
                <label>Option A</label>
                <input type="text" name="option1" required>
            </div>

            <div class="option-box">
                <label>Option B</label>
                <input type="text" name="option2" required>
            </div>

            <div class="option-box">
                <label>Option C</label>
                <input type="text" name="option3" required>
            </div>

            <div class="option-box">
                <label>Option D</label>
                <input type="text" name="option4" required>
            </div>

        </div>

        <!-- CORRECT ANSWER -->
        <label style="margin-top:15px;">Select Correct Answer</label>

        <div class="radio-group">

            <label>
                <input type="radio" name="correct" value="option1" required>
                Option A
            </label>

            <label>
                <input type="radio" name="correct" value="option2">
                Option B
            </label>

            <label>
                <input type="radio" name="correct" value="option3">
                Option C
            </label>

            <label>
                <input type="radio" name="correct" value="option4">
                Option D
            </label>

        </div>

        <!-- SAVE BUTTON -->
        <button type="submit">
            Save Quiz
        </button>

    </form>

</div>

</body>
</html>
