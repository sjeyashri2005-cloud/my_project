<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6ff;
            margin: 0;
            padding: 0;
        }

        h1 {
            background: #1976d2;
            color: white;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        p {
            text-align: center;
            font-size: 18px;
            margin-top: 10px;
        }

        hr {
            margin: 20px 0;
            border: 1px solid #ddd;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #eee;
        }

        th {
            background: #1976d2;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        button {
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
        }

        button[style*="background:blue"] {
            background: #1976d2 !important;
            color: white;
        }

        button[style*="background:red"] {
            background: red !important;
            color: white;
            display: block;
            margin: 20px auto;
            padding: 10px 15px;
        }

        /* ✅ NEW ADDITION: Link reset style */
        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

<h1>Teacher Dashboard</h1>

<p>Welcome {{ teacher.fullname }}</p>

<hr>

<h2>Assigned Subjects</h2>

{% if subjects %}

<table>
    <tr>
        <th>ID</th>
        <th>Subject</th>
        <th>Chapter</th>
        <th>Action</th>
    </tr>

    {% for s in subjects %}
    <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.subject_name }}</td>
        <td>{{ s.chapter_name }}</td>

        <td>
            <!-- ✅ FIXED LINK (WORKING SUBJECT WISE QUIZ) -->
            <a href="/quizzes/{{ s.id }}">
                <button style="background:blue;color:white;padding:5px;">
                    My Quizzes
                </button>
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

{% else %}
<p style="text-align:center;color:red;">No subjects assigned</p>
{% endif %}

<hr>

<!-- LOGOUT -->
<a href="/logout">
    <button style="background:red;color:white;padding:8px 12px;">
        Logout
    </button>
</a>

</body>
</html>
