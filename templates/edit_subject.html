<!DOCTYPE html>
<html>

<head>

    <title>Edit Subject</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f4f6f9;
        }

        /* MAIN CONTAINER */
        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        /* HEADING */
        h2{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
        }

        /* FORM */
        form{
            display:flex;
            flex-direction:column;
        }

        /* INPUT BOX */
        input{
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#3498db;
            box-shadow:0px 0px 5px rgba(52,152,219,0.4);
        }

        /* BUTTON */
        button{
            background:#3498db;
            color:white;
            border:none;
            padding:12px;
            border-radius:6px;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2980b9;
        }

        /* RESPONSIVE */
        @media screen and (max-width:500px){

            .container{
                width:90%;
                padding:20px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <h2>Edit Subject</h2>

    <form method="POST">

        <!-- SUBJECT NAME -->

        <input type="text"
               name="subject_name"
               value="{{ subject.subject_name }}"
               placeholder="Enter Subject Name"
               required>

        <!-- CHAPTER NAME -->

        <input type="text"
               name="chapter_name"
               value="{{ subject.chapter_name }}"
               placeholder="Enter Chapter Name"
               required>

        <!-- UPDATE BUTTON -->

        <button type="submit">

            Update Subject

        </button>

    </form>

</div>

</body>

</html>
