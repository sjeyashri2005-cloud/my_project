<!DOCTYPE html>
<html>

<head>

    <title>Edit User</title>

    <style>

        body{
            font-family:Arial;
            background:#eef3fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#1976d2;
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        input:focus{
            border:1px solid #1976d2;
        }

        button{
            width:95%;
            padding:12px;
            background:#1976d2;
            border:none;
            color:white;
            font-weight:bold;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#125aa0;
        }

        .note{
            font-size:12px;
            color:gray;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Edit User</h2>

    <form method="POST">

        <!-- NAME -->
        <input type="text"
               name="fullname"
               value="{{ user.fullname }}"
               placeholder="Full Name">

        <!-- EMAIL -->
        <input type="email"
               name="email"
               value="{{ user.email }}"
               placeholder="Email">

        <!-- PASSWORD RESET -->
        <input type="password"
               name="password"
               placeholder="New Password (leave empty if not changing)">

        <p class="note">
            ⚠ Leave password empty if you don't want to reset it
        </p>

        <button type="submit">Update User</button>

    </form>

</div>

</body>

</html>
