<!DOCTYPE html>
<html>

<head>

    <title>Login - Quiz Master</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="auth-wrapper">

    <div class="auth-box">

        <h1>Quiz Master</h1>

        <p>Learn, Create and Challenge Knowledge</p>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">

                LOGIN

            </button>

        </form>

        <p>

            Don't have account?

            <a href="/signup">

                Sign Up

            </a>

        </p>

    </div>

</div>

</body>

</html>
